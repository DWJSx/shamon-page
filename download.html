<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shamon Download Redirect</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f7fb;
      color: #172033;
    }

    main {
      width: min(36rem, calc(100vw - 2rem));
      padding: 2rem;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 20px 45px rgba(23, 32, 51, 0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.75rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
    }

    code {
      font-family: "SFMono-Regular", "SF Mono", Consolas, monospace;
      font-size: 0.95em;
    }

    .error {
      color: #a1260d;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Preparing download...</h1>
    <p id="message">Redirecting to the matching GitHub Release asset.</p>
  </main>

  <script>
    (function () {
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const params = new URLSearchParams(window.location.search);
      const version = params.get("version");
      const versionPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?\+\d+$/;

      if (!version) {
        title.textContent = "Missing version";
        message.className = "error";
        message.innerHTML = 'Add a <code>?version=1.2.3+4</code> query parameter to this URL.';
        return;
      }

      if (!versionPattern.test(version)) {
        title.textContent = "Invalid version";
        message.className = "error";
        message.innerHTML = 'Use a full Shamon release version like <code>1.2.3+4</code>.';
        return;
      }

      const tag = "v" + version;
      const asset = "shamon-" + version.replace("+", "-") + ".dmg";
      const downloadUrl =
        "https://github.com/DWJSx/shamon-page/releases/download/" +
        encodeURIComponent(tag) +
        "/" +
        encodeURIComponent(asset);

      window.location.replace(downloadUrl);
    }());
  </script>
</body>
</html>
